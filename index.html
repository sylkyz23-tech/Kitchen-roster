<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kitchen Roster</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial,sans-serif;padding:20px}
h1{font-size:2.5rem}
button{padding:12px;margin:4px}
table{border-collapse:collapse;width:100%}
td,th{border:1px solid #999;padding:8px;text-align:center}
.selected{background:#dff0d8}
</style>
</head>
<body>
<h1>Kitchen Roster</h1>
<div>
<button onclick="setShift('11:30-fin')">11:30-fin</button>
<button onclick="setShift('5:30-fin')">5:30-fin</button>
<button onclick="setShift('6-fin')">6-fin</button>
<button onclick="setShift('Off')">Off</button>
</div>
<table id="roster">
<tr><th>Staff</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th></tr>
</table>
<script>
const staff=['Sylvia','Hinemoa','Hamu','Lily-May','Raz','Waiaariki','Bailee','Ruby'];
const days=7;
const table=document.getElementById('roster');
staff.forEach(name=>{
 let r=table.insertRow();
 r.insertCell().innerText=name;
 for(let i=0;i<days;i++){
   let c=r.insertCell();
   c.onclick=()=>{c.innerText=currentShift;localStorage.setItem('roster',table.innerHTML)};
 }
});
let currentShift='11:30-fin';
function setShift(s){currentShift=s;}
const saved=localStorage.getItem('roster');
if(saved) table.innerHTML=saved;
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>
